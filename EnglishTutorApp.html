<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI English Tutor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <h1>AI English Tutor</h1>
        <p>Learn English for free, every day.</p>
    </header>

    <section>
        <h2>Word of the Day</h2>
        <h3>Resilient</h3>
        <p><strong>Meaning:</strong> Able to withstand or recover quickly from difficult conditions.</p>
        <p><strong>Example:</strong> "She is very resilient and always tries again after failing."</p>
    </section>

    <section>
        <h2>Practice Conversation</h2>
        <div class="chat-window" id="chat-window">
            <p><em>AI Chatbox is waking up...</em></p>
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message in English...">
            <button id="send-btn">Send</button>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
